seed: 42

model:
  base_model: vinai/phobert-base
  num_labels: 3
  use_fast_tokenizer: false
  labels:
    - NEGATIVE
    - NEUTRAL
    - POSITIVE

data:
  train_file: ml/sentiment/data/sentiment_train.csv
  valid_file: ml/sentiment/data/sentiment_valid.csv
  test_file: ml/sentiment/data/sentiment_test.csv
  text_column: feedback_text
  label_column: sentiment_label
  max_length: 256

train:
  output_dir: ml/sentiment/artifacts/checkpoints/phobert-sentiment
  batch_size: 16
  learning_rate: 2.0e-5
  num_train_epochs: 3
  weight_decay: 0.01
  warmup_ratio: 0.1
  logging_steps: 20
  eval_strategy: epoch
  save_strategy: epoch
  save_total_limit: 2
  metric_for_best_model: f1_macro
  greater_is_better: true

score_mapping:
  method: pos_minus_neg
